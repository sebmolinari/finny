name: CI Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
    tags: ["v*.*.*"]

jobs:
  validate-branch:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest #🔥 validate branch policy before running any tests or builds

    steps:
      - name: Validate PR source branch #🔥 enforce PRs to master only come from develop or hotfix
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"

          if [[ "${{ github.base_ref }}" == "master" ]]; then
            if [[ "${{ github.head_ref }}" != "develop" && "${{ github.head_ref }}" != "hotfix" ]]; then
              echo "❌ PRs to master must come from 'develop' or 'hotfix'"
              exit 1
            fi
          fi

          echo "✅ Branch policy OK"

  unit-test-with-coverage:
    needs: validate-branch # 🔥 BLOCKS tests if branch policy not met
    if: always() # 🔥 ensures it still runs on push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install backend deps
        run: npm install
        working-directory: ./backend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: ./backend

  build-and-push:
    if: github.event_name == 'push' && always() # run on push only; ignore skipped dependencies but still block on test failures
    needs: unit-test-with-coverage # 🔥 BLOCKS docker if tests fail or coverage not meet
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Allows amd64 GitHub runner to build ARM64 via emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/finny
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
